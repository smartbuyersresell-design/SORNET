<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>Sornet Search</title>
<meta name="description" content="Sornet — fast, clean, AI-powered search that stays right where you are.">

<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icon-16.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0b0b12" media="(prefers-color-scheme: dark)">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sornet">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Google+Sans:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#ffffff;
    --surface:#ffffff;
    --surface-2:#f8f9fa;
    --text:#202124;
    --muted:#5f6368;
    --border:#dfe1e5;
    --border-soft:#ebebeb;
    --link:#5b3df0;
    --link-visited:#7c5cff;
    --accent1:#6b4eff;
    --accent2:#29b8d8;
    --accent3:#ff5fa2;
    --shadow:0 1px 6px rgba(32,33,36,0.18);
    --shadow-lg:0 4px 22px rgba(32,33,36,0.16);
    --radius:24px;
  }
  html[data-theme="dark"]{
    --bg:#0b0b12;
    --surface:#151521;
    --surface-2:#1c1c2b;
    --text:#e8e6f0;
    --muted:#a09cc0;
    --border:#2c2c40;
    --border-soft:#232235;
    --link:#9ea8ff;
    --link-visited:#c9a8ff;
    --shadow:0 1px 6px rgba(0,0,0,0.5);
    --shadow-lg:0 8px 30px rgba(0,0,0,0.55);
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ height:100%; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Roboto','Google Sans',Arial,sans-serif;
    min-height:100dvh;
    overflow-x:hidden;
    transition:background .25s ease, color .25s ease;
    position:relative;
  }

  /* ---------- Ambient background animation ---------- */
  canvas#bg{
    position:fixed; inset:0; width:100%; height:100%;
    z-index:0; pointer-events:none; opacity:0.6;
  }
  .bg-glow{
    position:fixed; top:-10%; left:50%; width:900px; height:900px;
    transform:translateX(-50%);
    background:conic-gradient(from 0deg, rgba(107,78,255,0.08), rgba(41,184,216,0.07), rgba(255,95,162,0.06), rgba(107,78,255,0.08));
    filter:blur(120px);
    border-radius:50%;
    z-index:0; pointer-events:none;
    animation:spin-slow 60s linear infinite;
  }
  @keyframes spin-slow{ to{ transform:translateX(-50%) rotate(360deg); } }

  a{ color:var(--link); text-decoration:none; }
  a:hover{ text-decoration:underline; }

  button{ font-family:inherit; }

  /* ---------- Top bar ---------- */
  .topbar{
    position:relative; z-index:5;
    display:flex; align-items:center; justify-content:space-between;
    gap:14px;
    padding:12px 18px;
    padding-top:calc(12px + env(safe-area-inset-top));
    border-bottom:1px solid var(--border-soft);
    background:var(--bg);
  }
  .topbar-left{
    display:flex; align-items:center; gap:10px;
  }
  .topbar-right{
    display:flex; align-items:center; gap:12px;
    margin-left:auto;
  }
  .icon-btn{
    width:40px; height:40px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:transparent;
    border:none;
    cursor:pointer;
    color:var(--muted);
    transition:background .15s ease, color .15s ease;
  }
  .icon-btn:hover{ background:var(--surface-2); color:var(--text); }
  .icon-btn svg{ width:20px; height:20px; }

  .signin-btn{
    background:var(--accent1);
    color:#fff;
    border:none;
    padding:8px 18px;
    border-radius:20px;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    transition:filter .15s ease;
  }
  .signin-btn:hover{ filter:brightness(1.1); }

  .avatar{
    width:32px; height:32px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,var(--accent1),var(--accent2));
    color:#fff;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
    border:none;
    font-family:'Space Grotesk',sans-serif;
  }

  /* ---------- Tabs ---------- */
  .tabs-container{
    position:relative; z-index:4;
    display:flex; align-items:center; gap:0px;
    padding:0 10px;
    border-bottom:1px solid var(--border-soft);
    background:var(--bg);
    overflow-x:auto;
    -ms-overflow-style:none; scrollbar-width:none;
  }
  .tabs-container::-webkit-scrollbar{ display:none; }
  
  .tab-item{
    display:flex; align-items:center; gap:8px;
    padding:10px 14px;
    border-bottom:2px solid transparent;
    cursor:pointer;
    transition:all .15s ease;
    color:var(--muted);
    font-size:13px;
    white-space:nowrap;
    flex-shrink:0;
    border-radius:8px 8px 0 0;
    background:transparent;
    border:none;
  }
  .tab-item:hover{ background:var(--surface-2); }
  .tab-item.active{
    border-bottom-color:var(--accent1);
    color:var(--text);
    font-weight:500;
  }
  .tab-item .tab-close{
    width:16px; height:16px;
    display:flex; align-items:center; justify-content:center;
    border-radius:50%;
    transition:background .15s;
    color:var(--muted);
    opacity:0.6;
  }
  .tab-item:hover .tab-close{ background:var(--border); opacity:1; }

  .new-tab-btn{
    width:32px; height:32px;
    border-radius:50%;
    background:transparent;
    border:none;
    cursor:pointer;
    color:var(--muted);
    display:flex; align-items:center; justify-content:center;
    transition:background .15s;
    flex-shrink:0;
  }
  .new-tab-btn:hover{ background:var(--surface-2); }

  /* ---------- Home view ---------- */
  #homeView{
    position:relative; z-index:2;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center;
    min-height:calc(100dvh - 120px);
    padding:20px 20px 60px;
  }
  .logo-mark{
    display:flex; align-items:center; gap:2px;
    margin-bottom:26px;
    user-select:none;
  }
  .logo-mark img{ width:44px; height:44px; border-radius:11px; }
  .logo-text{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:52px;
    letter-spacing:-1.5px;
    background:linear-gradient(120deg,var(--accent1) 15%, var(--accent2) 55%, var(--accent3) 90%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  .search-shell{ width:min(560px,92vw); }
  .search-pill{
    display:flex; align-items:center; gap:10px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:24px;
    padding:0 18px;
    height:48px;
    box-shadow:var(--shadow);
    transition:box-shadow .18s ease, border-color .18s ease;
  }
  .search-pill:hover, .search-pill.focused{
    box-shadow:var(--shadow-lg);
    border-color:transparent;
  }
  .search-pill svg.search-icon{ color:var(--muted); flex-shrink:0; width:18px; height:18px; }
  .search-pill input{
    flex:1; border:none; outline:none; background:transparent;
    color:var(--text); font-size:16px; height:100%;
  }
  .search-pill input::placeholder{ color:var(--muted); }

  .home-actions{
    display:flex; gap:12px; justify-content:center;
    margin-top:26px; flex-wrap:wrap;
  }
  .action-btn{
    background:var(--surface-2);
    border:1px solid var(--surface-2);
    color:var(--text);
    font-size:14px;
    padding:9px 18px;
    border-radius:6px;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .action-btn:hover{ border-color:var(--border); background:var(--surface); }
  .action-btn.ai{ color:var(--accent1); font-weight:500; }

  /* ---------- Engine selector chips ---------- */
  .engine-row{
    display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
    margin-top:18px;
  }
  .engine-chip{
    display:flex; align-items:center; gap:7px;
    background:var(--surface);
    border:1.5px solid var(--border);
    color:var(--muted);
    font-size:12.5px; font-weight:500;
    padding:7px 14px 7px 8px;
    border-radius:20px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .engine-chip:hover{ border-color:var(--accent1); color:var(--text); }
  .engine-chip.active{
    background:var(--accent1);
    border-color:var(--accent1);
    color:#fff;
  }
  .engine-chip .eng-badge{
    width:19px; height:19px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:10.5px; font-weight:700;
    flex-shrink:0;
    color:#fff;
  }
  .engine-chip.active .eng-badge{ background:rgba(255,255,255,0.25) !important; }
  .eng-sornet{ background:linear-gradient(135deg,var(--accent1),var(--accent2)); }
  .eng-google{ background:#4285f4; }
  .eng-bing{ background:#008373; }
  .eng-duckduckgo{ background:#de5833; }
  .eng-yahoo{ background:#6001d2; }

  .home-sub{
    margin-top:34px; font-size:12.5px; color:var(--muted); text-align:center;
  }

  /* ---------- Results view ---------- */
  #resultsView{
    position:relative; z-index:2;
    display:none;
    min-height:100dvh;
    flex-direction:column;
  }
  .results-topbar{
    display:flex; align-items:center; gap:12px;
    padding:10px 14px;
    border-bottom:1px solid var(--border-soft);
    background:var(--bg);
    position:sticky; top:0; z-index:6;
  }
  .results-topbar .logo-mark{ margin:0; cursor:pointer; }
  .results-topbar .logo-mark img{ width:28px; height:28px; border-radius:6px; }
  .results-topbar .logo-text{ font-size:18px; letter-spacing:-0.5px; }
  .results-search{ flex:1; max-width:500px; }
  .results-search .search-pill{ height:40px; box-shadow:none; border-color:var(--border); font-size:14px; }
  .results-search .search-pill:hover, .results-search .search-pill.focused{ box-shadow:var(--shadow); }

  .results-body{
    width:min(680px,94vw);
    margin:0 auto;
    padding:20px 6px 80px;
  }

  .status-line{ font-size:13px; color:var(--muted); margin-bottom:18px; }
  .status-line b{ color:var(--text); }

  .skeleton{ display:flex; flex-direction:column; gap:22px; }
  .skel-line{ height:12px; border-radius:6px; background:var(--surface-2); position:relative; overflow:hidden; }
  .skel-line::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    animation:shimmer 1.3s infinite;
  }
  html[data-theme="dark"] .skel-line::after{ background:linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent); }
  @keyframes shimmer{ from{ transform:translateX(-100%); } to{ transform:translateX(100%); } }

  .ai-card{
    background:var(--surface-2);
    border:1px solid var(--border-soft);
    border-radius:16px;
    padding:20px 22px;
    margin-bottom:26px;
  }
  .ai-card .ai-badge{
    display:inline-flex; align-items:center; gap:6px;
    font-size:11.5px; font-weight:700; letter-spacing:0.4px;
    color:#fff;
    background:linear-gradient(120deg,var(--accent1),var(--accent2));
    padding:3px 10px; border-radius:20px;
    margin-bottom:12px;
    text-transform:uppercase;
  }
  .ai-card h2{ font-size:19px; margin-bottom:8px; font-family:'Space Grotesk',sans-serif; }
  .ai-card p{ font-size:14.5px; line-height:1.65; color:var(--text); }
  .ai-card .ai-source{ display:block; margin-top:12px; font-size:12.5px; color:var(--muted); }
  .ai-card .ai-source a{ color:var(--link); }
  .ai-card .ai-source a:hover{ text-decoration:underline; }

  .result-item{ margin-bottom:26px; max-width:100%; }
  .result-url{
    display:flex; align-items:center; gap:8px;
    font-size:12.5px; color:var(--muted); margin-bottom:3px;
  }
  .result-url .favicon{
    width:16px; height:16px; border-radius:50%; background:var(--surface-2);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    font-size:9px; font-weight:700; color:var(--accent1);
  }
  .result-title{
    font-size:18px; color:var(--link); display:block;
    margin-bottom:4px; width:fit-content; max-width:100%;
  }
  .result-title:hover{ text-decoration:underline; }
  .result-desc{ font-size:13.5px; color:var(--text); line-height:1.55; opacity:0.88; }

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--muted);
  }
  .empty-state svg{ width:56px; height:56px; opacity:0.35; margin-bottom:16px; }
  .empty-state h3{ font-size:17px; color:var(--text); margin-bottom:6px; font-family:'Space Grotesk',sans-serif; }
  .empty-state p{ font-size:13.5px; max-width:340px; margin:0 auto; }

  .powered-by{
    text-align:center; font-size:11.5px; color:var(--muted); margin-top:20px;
    padding-top:16px; border-top:1px solid var(--border-soft);
  }

  /* ---------- Sidebars ---------- */
  .sidebar{
    position:fixed; top:0; left:-320px; width:280px; height:100dvh;
    background:var(--surface);
    border-right:1px solid var(--border-soft);
    z-index:40;
    transition:left .3s ease;
    overflow-y:auto;
    padding-top:env(safe-area-inset-top);
  }
  .sidebar.show{ left:0; }
  .sidebar-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px;
    border-bottom:1px solid var(--border-soft);
  }
  .sidebar-title{ font-size:14px; font-weight:600; color:var(--text); }
  .sidebar-close{ background:none; border:none; cursor:pointer; color:var(--muted); padding:4px; }
  .sidebar-content{ padding:12px; }
  .sidebar-item{
    display:flex; align-items:center; gap:12px;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    transition:background .15s;
    font-size:13px;
    color:var(--text);
    background:none;
    border:none;
    width:100%;
    text-align:left;
  }
  .sidebar-item:hover{ background:var(--surface-2); }
  .sidebar-item svg{ width:18px; height:18px; color:var(--muted); flex-shrink:0; }
  .sidebar-item-time{ font-size:11px; color:var(--muted); margin-top:2px; }
  .sidebar-divider{ height:1px; background:var(--border-soft); margin:12px 0; }
  .sidebar-action{
    display:flex; align-items:center; justify-content:center;
    gap:8px;
    padding:10px 12px;
    background:var(--surface-2);
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
    color:var(--text);
    transition:background .15s;
    width:100%;
    margin-top:8px;
  }
  .sidebar-action:hover{ background:var(--border-soft); }

  .overlay{
    position:fixed; inset:0; z-index:35;
    background:rgba(20,20,30,0.45);
    backdrop-filter:blur(3px);
    display:none;
  }
  .overlay.show{ display:block; }

  /* ---------- Modal (Gmail sign up) ---------- */
  .modal-container{
    position:fixed; inset:0; z-index:50;
    display:none; align-items:center; justify-content:center;
    padding:20px;
  }
  .modal-container.show{ display:flex; }
  .modal{
    width:min(380px,100%);
    background:var(--surface);
    border-radius:20px;
    padding:30px 26px 26px;
    box-shadow:var(--shadow-lg);
    animation:pop-in .2s ease;
  }
  @keyframes pop-in{ from{ transform:scale(0.94); opacity:0; } to{ transform:scale(1); opacity:1; } }
  .modal h2{ font-size:20px; font-family:'Space Grotesk',sans-serif; margin-bottom:6px; }
  .modal p.sub{ font-size:13px; color:var(--muted); margin-bottom:20px; }
  .field-label{ font-size:12.5px; color:var(--muted); margin-bottom:6px; display:block; }
  .input-wrap{
    display:flex; align-items:center; gap:8px;
    border:1.5px solid var(--border);
    border-radius:10px; padding:0 12px; height:46px;
    margin-bottom:8px;
  }
  .input-wrap:focus-within{ border-color:var(--accent1); }
  .input-wrap svg{ width:18px; height:18px; color:var(--muted); flex-shrink:0; }
  .input-wrap input{
    flex:1; border:none; outline:none; background:transparent; font-size:14.5px; color:var(--text); height:100%;
  }
  .field-error{ font-size:12px; color:#e0554f; min-height:16px; margin-bottom:10px; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:14px; }
  .btn-text{ background:none; border:none; color:var(--accent1); font-size:14px; font-weight:500; cursor:pointer; padding:9px 14px; border-radius:8px; }
  .btn-text:hover{ background:var(--surface-2); }
  .btn-solid{ background:var(--accent1); color:#fff; border:none; font-size:14px; font-weight:500; cursor:pointer; padding:9px 18px; border-radius:8px; }
  .btn-solid:hover{ filter:brightness(1.08); }
  .btn-solid:disabled{ opacity:0.5; cursor:not-allowed; }

  /* ---------- Account menu ---------- */
  .account-menu{
    position:fixed; top:54px; right:14px; z-index:50;
    width:300px;
    background:var(--surface);
    border-radius:16px;
    box-shadow:var(--shadow-lg);
    border:1px solid var(--border-soft);
    display:none;
    overflow:hidden;
  }
  .account-menu.show{ display:block; }
  .am-header{ padding:20px 20px 16px; text-align:center; border-bottom:1px solid var(--border-soft); }
  .am-header .avatar{ width:52px; height:52px; font-size:20px; margin:0 auto 10px; }
  .am-header .email{ font-size:14px; font-weight:500; word-break:break-all; }
  .am-section{ padding:8px 8px; border-bottom:1px solid var(--border-soft); }
  .am-section:last-child{ border-bottom:none; }
  .am-row{
    display:flex; align-items:center; gap:12px;
    width:100%; padding:11px 12px; border-radius:10px;
    background:none; border:none; cursor:pointer; text-align:left;
    font-size:13.5px; color:var(--text);
  }
  .am-row:hover{ background:var(--surface-2); }
  .am-row svg{ width:18px; height:18px; color:var(--muted); flex-shrink:0; }
  .am-row .mini-avatar{ width:24px; height:24px; font-size:11px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--accent1),var(--accent2)); color:#fff; }
  .am-row.active{ background:var(--surface-2); font-weight:500; }

  .theme-toggle-row{ display:flex; align-items:center; justify-content:space-between; padding:11px 12px; }
  .theme-toggle-row span{ font-size:13.5px; display:flex; align-items:center; gap:10px; }
  .theme-toggle-row svg{ width:18px; height:18px; color:var(--muted); }
  .switch{ position:relative; width:40px; height:22px; }
  .switch input{ opacity:0; width:0; height:0; }
  .switch-track{
    position:absolute; inset:0; background:var(--border); border-radius:20px; cursor:pointer; transition:background .2s;
  }
  .switch-track::before{
    content:""; position:absolute; width:16px; height:16px; left:3px; top:3px;
    background:#fff; border-radius:50%; transition:transform .2s;
  }
  .switch input:checked + .switch-track{ background:var(--accent1); }
  .switch input:checked + .switch-track::before{ transform:translateX(18px); }

  @media (max-width:480px){
    .logo-text{ font-size:42px; }
    .account-menu{ width:calc(100vw - 24px); right:12px; }
    .results-topbar .logo-text{ display:none; }
    .tab-item{ font-size:12px; padding:8px 10px; }
    .topbar{ padding:10px 12px; padding-top:calc(10px + env(safe-area-inset-top)); }
  }

  @media (prefers-reduced-motion: reduce){
    .bg-glow{ animation:none; }
    .skel-line::after{ animation:none; }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="bg-glow"></div>

<!-- ============ TOP BAR ============ -->
<div class="topbar" id="mainTopbar">
  <div class="topbar-left">
    <button class="icon-btn" id="menuBtn" aria-label="Menu" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" id="historyBtn" aria-label="History" title="History">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </button>
    <button class="icon-btn" id="downloadsBtn" aria-label="Downloads" title="Downloads">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button class="icon-btn" id="settingsBtn" aria-label="Settings" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button class="signin-btn" id="signinBtn">Sign up</button>
    <button class="avatar" id="avatarBtn" style="display:none;"></button>
  </div>
</div>

<!-- ============ TABS ============ -->
<div class="tabs-container" id="tabsContainer">
</div>

<!-- ============ HOME VIEW ============ -->
<main id="homeView">
  <div class="logo-mark">
    <img src="icon-120.png" alt="Sornet">
    <span class="logo-text">Sornet</span>
  </div>

  <div class="search-shell">
    <form id="homeForm">
      <div class="search-pill" id="homePill">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="homeInput" autocomplete="off" placeholder="Search Sornet or type a question" aria-label="Search">
      </div>
    </form>
    <div class="home-actions">
      <button class="action-btn ai" id="btnSornetSearch">Search</button>
    </div>
    <div class="engine-row" id="engineRowHome"></div>
    <p class="home-sub">Sornet AI answers instantly, right here. Switch engines to pull full results from the web.</p>
  </div>
</main>

<!-- ============ RESULTS VIEW ============ -->
<div id="resultsView">
  <div class="results-topbar">
    <div class="logo-mark" id="logoBackBtn" title="Back to home" style="cursor:pointer;">
      <img src="icon-120.png" alt="Sornet">
      <span class="logo-text">Sornet</span>
    </div>
    <form id="resultsForm" class="results-search">
      <div class="search-pill" id="resultsPill">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="resultsInput" autocomplete="off" aria-label="Search">
      </div>
    </form>
  </div>
  <div class="engine-row" id="engineRowResults" style="border-bottom:1px solid var(--border-soft); padding:10px 18px; margin:0;"></div>

  <div class="results-body">
    <p class="status-line" id="statusLine"></p>
    <div id="resultsContent"></div>
  </div>
</div>

<!-- ============ Sidebars ============ -->
<div class="overlay" id="overlay"></div>

<div class="sidebar" id="historySidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">Search History</span>
    <button class="sidebar-close" id="closeHistorySidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sidebar-content" id="historyContent"></div>
</div>

<div class="sidebar" id="downloadsSidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">Downloads</span>
    <button class="sidebar-close" id="closeDownloadsSidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sidebar-content" id="downloadsContent"></div>
</div>

<!-- ============ Gmail sign-up modal ============ -->
<div class="modal-container" id="signinModal">
  <div class="overlay"></div>
  <div class="modal">
    <h2>Continue with Gmail</h2>
    <p class="sub">Sign up to sync your Sornet preferences on this device.</p>
    <label class="field-label" for="gmailInput">Gmail address</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>
      <input type="email" id="gmailInput" placeholder="yourname@gmail.com" autocomplete="email">
    </div>
    <p class="field-error" id="gmailError"></p>
    <div class="modal-actions">
      <button class="btn-text" id="cancelSignin">Cancel</button>
      <button class="btn-solid" id="confirmSignin">Continue</button>
    </div>
  </div>
</div>

<!-- ============ Account / settings menu ============ -->
<div class="account-menu" id="accountMenu">
  <div class="am-header" id="amHeader">
    <div class="avatar" id="amAvatar" style="pointer-events:none;"></div>
    <div class="email" id="amEmail">Not signed in</div>
  </div>
  <div class="am-section" id="amAccountsSection"></div>
  <div class="am-section">
    <div class="theme-toggle-row">
      <span>
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        Dark mode
      </span>
      <label class="switch">
        <input type="checkbox" id="themeSwitch">
        <span class="switch-track"></span>
      </label>
    </div>
  </div>
  <div class="am-section" id="amSignoutSection" style="display:none;">
    <button class="am-row" id="clearHistoryBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 4 21 4"/><path d="M19 4v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4M10 9v6M14 9v6"/></svg>
      Clear all history
    </button>
    <button class="am-row" id="signOutBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
